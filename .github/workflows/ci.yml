name: CI Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:

jobs:
    lint:
        name: Lint (StyleCop / Dotnet Format)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore EleveRats.slnx

            - name: Verify formatting
              run: dotnet format EleveRats.slnx --verify-no-changes

    build:
        name: Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Setup Just
              uses: extractions/setup-just@v3

            - name: Restore dependencies
              run: dotnet restore EleveRats.slnx

            - name: Build
              run: just build

    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Setup Just
              uses: extractions/setup-just@v3

            - name: Restore dependencies
              run: dotnet restore EleveRats.slnx

            - name: Build
              run: just build

            - name: Run Tests
              run: just test

    coverage:
        name: Code Coverage
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Setup Just
              uses: extractions/setup-just@v3

            - name: Restore dependencies
              run: dotnet restore EleveRats.slnx

            - name: Run Tests with Coverage
              run: just test-coverage

            - name: Upload Coverage Results
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: backend.tests/TestResults/**/coverage.opencover.xml

    frontend-lint:
        name: Frontend Lint & Format
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Check Formatting
              run: bun run format:check

            - name: Run Linter
              run: bun run lint

    frontend-typecheck:
        name: Frontend Type Check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run Type Check
              run: bun run type-check

    frontend-test:
        name: Frontend Tests
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run Tests with Coverage
              run: bun run test:cov

    frontend-build:
        name: Frontend Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Build
              run: bun run build

    report:
        name: Final Report
        needs:
            [
                lint,
                sonar,
                build,
                test,
                coverage,
                frontend-lint,
                frontend-typecheck,
                frontend-test,
                frontend-build,
            ]
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: always()
        steps:
            - name: Generate Summary
              run: |
                  echo "## 🚀 CI Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
                  echo "### Backend Jobs" >> $GITHUB_STEP_SUMMARY
                  echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
                  echo "| --- | ------ |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🧹 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🔍 Sonar | ${{ needs.sonar.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🔨 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| 📊 Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Frontend Jobs" >> $GITHUB_STEP_SUMMARY
                  echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
                  echo "| --- | ------ |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🧹 Lint & Format | ${{ needs.frontend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🏷️ Type Check | ${{ needs.frontend-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🧪 Tests | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
                  echo "| 🔨 Build | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY

            - name: Check overall status
              if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
              run: exit 1


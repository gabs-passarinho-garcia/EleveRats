server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Arquivo de cursor para o Promtail não re-processar logs já enviados após restart
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Coleta logs de todos os containers Docker da Nave-Mãe
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Usa o nome do container como label 'container'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Usa a imagem Docker como label 'image'
      - source_labels: ['__meta_docker_container_image']
        target_label: image
      # Dropa containers sem nome (ex: containers de build temporários)
      - source_labels: ['container']
        regex: ''
        action: drop

# Docker Compose for EleveRats 2026
# Infrastructure: Cloudflare Tunnels, PostgreSQL, MinIO, n8n, .NET Minimal API, and LGTM Observability

services:
  # Cloudflare Tunnel - The gatekeeper for Zero Trust security
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel run
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - eleverats-net
      - rpg-net

  # PostgreSQL - The relational database for points, users, and check-ins
  db:
    image: postgres:18-alpine
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: eleverats_db
      PGDATA: /var/lib/postgresql/data/pgdata
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 4G
        reservations:
          cpus: "0.2"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d eleverats_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    networks:
      - eleverats-net

  # pgBouncer - Connection pooling for all databases
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/eleverats_db
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - /mnt/dados/eleverats-state/data/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - eleverats-net

  # MinIO - Object storage for heavy media (workout proofs)
  minio:
    image: minio/minio:latest
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.2"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - minio_data:/data
    networks:
      eleverats-net:
        aliases:
          - plane-minio
      rpg-net:

  # n8n - The webhook receiver and initial validation gateway
  n8n:
    image: n8nio/n8n:latest
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=pgbouncer
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_HOST=n8n.gabspassarinhogarcia.uk
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
      - QUEUE_BULL_REDIS_DB=1
      - N8N_METRICS=true
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          cpus: "0.2"
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - pgbouncer
      - redis
    networks:
      - eleverats-net
      - rpg-net

  # Redis - Cache in-memory
  redis:
    image: redis:8-alpine
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    networks:
      - eleverats-net

  # .NET Minimal API - The brain enforcing the business rules
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      - ConnectionStrings__DefaultConnection=Host=pgbouncer;Database=eleverats_db;Username=${DB_USER};Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=${MINIO_USER}
      - Minio__SecretKey=${MINIO_PASSWORD}
      - ASPNETCORE_URLS=http://+:3000
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.2"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - pgbouncer
      - minio
      - redis
    networks:
      - eleverats-net

  # --- OBSERVABILIDADE (LGTM) ---

  # Grafana Loki - O Diário de Bordo (Logs de App)
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - eleverats-net

  # Promtail - O Carteiro dos Logs
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: always
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    networks:
      - eleverats-net

  # Grafana Tempo - O GPS (Traces)
  tempo:
    image: grafana/tempo:2.7.2
    container_name: tempo
    restart: always
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - eleverats-net

  # O Coletor de Métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.1"
          memory: 256M
    networks:
      - eleverats-net

  # O Painel de Visualização
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - eleverats-net

  # Monitores do Host e Containers
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 128M
    networks:
      - eleverats-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: cadvisor
    command:
      - "-disable_metrics=disk,diskIO"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - eleverats-net

  # FoundryVTT
  foundry:
    container_name: foundry
    image: felddy/foundryvtt:latest
    hostname: my_foundry_host
    volumes:
      - foundry_data:/data
    environment:
      - FOUNDRY_PASSWORD=${FOUNDRY_PASSWORD}
      - FOUNDRY_USERNAME=${FOUNDRY_USERNAME}
      - FOUNDRY_ADMIN_KEY=${FOUNDRY_ADMIN_KEY}
      - FOUNDRY_AWS_CONFIG=s3.json
      - FOUNDRY_COMPRESS_SOCKET=true
      - FOUNDRY_COMPRESS_STATIC=true
      - FOUNDRY_HOSTNAME=vtt.gabspassarinhogarcia.uk
      - FOUNDRY_HOT_RELOAD=true
      - FOUNDRY_LANGUAGE=pt-BR.pt-BR
      - FOUNDRY_PROXY_PORT=443
      - FOUNDRY_PROXY_SSL=true
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 1G
    networks:
      - rpg-net
  # Metabase - Business Intelligence for the Rat-Pack
  metabase:
    image: ghcr.io/dockarm/metabase-arm:v0.53.5
    platform: linux/amd64
    restart: always
    env_file:
      - /mnt/dados/eleverats-state/.env
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase_db
      - MB_DB_PORT=5432
      - MB_DB_USER=metabase_user
      - MB_DB_PASS=${METABASE_DB_PASSWORD}
      - MB_DB_HOST=pgbouncer
      - MB_JETTY_PORT=3001
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.2"
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - pgbouncer
    networks:
      - eleverats-net

networks:
  eleverats-net:
    driver: bridge
  rpg-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/postgres
  minio_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/minio
  n8n_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/n8n
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/redis
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/prometheus
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/grafana
  foundry_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/rpg-state/data/foundry
  loki_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/loki
  tempo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/tempo
  pgbouncer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/pgbouncer
  metabase_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/dados/eleverats-state/data/metabase

# Docker Compose for EleveRats 2026
# Infrastructure: Cloudflare Tunnels, PostgreSQL, MinIO, n8n, and .NET Minimal API
services:
  # Cloudflare Tunnel - The gatekeeper for Zero Trust security
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - eleverats-net

  # PostgreSQL - The relational database for points, users, and check-ins
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: eleverats_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backend/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    networks:
      - eleverats-net

  # MinIO - Object storage for heavy media (workout proofs)
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - eleverats-net

  # n8n - The webhook receiver and initial validation gateway
  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      # Isola o banco de dados do N8N
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_db
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=n8n_password
      - N8N_HOST=n8n.seudominio.uk
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # Queue e Cache robusto com Redis
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./data/n8n:/home/node/.n8n
    depends_on:
      - db
      - redis
    networks:
      - eleverats-net

  # Redis - Cache in-memory para velocidade absurda e controle de filas
  redis:
    image: redis:8-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    networks:
      - eleverats-net

  # .NET Minimal API - The brain enforcing the business rules
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=eleverats_db;Username=${DB_USER};Password=${DB_PASSWORD}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=${MINIO_USER}
      - Minio__SecretKey=${MINIO_PASSWORD}
      - ASPNETCORE_URLS=http://+:3000
    depends_on:
      - db
      - minio
      - redis
    networks:
      - eleverats-net

  # O Coletor de Métricas (O Cérebro)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - eleverats-net

  # O Painel de Visualização (A Beleza)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - ./data/grafana:/var/lib/grafana
    networks:
      - eleverats-net

  # Monitor do Host (Vê a CPU/RAM da Oracle)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)"
    networks:
      - eleverats-net

  # Monitor dos Containers (Vê o consumo de cada container)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - eleverats-net

networks:
  eleverats-net:
    driver: bridge

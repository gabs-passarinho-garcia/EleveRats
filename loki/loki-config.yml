auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# --- A MÁGICA DA LIMPEZA DE DISCO ---
compactor:
  working_directory: /loki/compactor
  retention_enabled: true # Liga o lixeiro
  retention_delete_delay: 2h # Tempo de carência antes de deletar fisicamente
  retention_delete_worker_count: 150
  # Obrigatório no Loki 3.x quando retention_enabled = true
  delete_request_store: filesystem

limits_config:
  retention_period: 30d # Mantém os logs por exatos 1 mês e apaga o resto
  
  # --- A MÁGICA DOS LOGS ATRASADOS ---
  reject_old_samples: true
  reject_old_samples_max_age: 168h # Aceita logs que chegaram com até 7 dias de atraso (ajuste se precisar de mais)
  creation_grace_period: 10m # Dá uma margem extra de tolerância caso o chunk original já tenha sido fechado
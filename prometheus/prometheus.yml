global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Puxando as métricas da Minimal API C# (Caso configure o pacote OpenTelemetry/Prometheus)
  - job_name: 'eleverats-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3000']

  # Puxando as métricas do Cluster MinIO (S3)
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']

  # Puxando as métricas do n8n
  - job_name: 'n8n'
    metrics_path: /metrics
    static_configs:
      - targets: ['n8n:5678']
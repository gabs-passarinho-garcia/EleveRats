server:
  # A porta HTTP que o Grafana vai usar para ler os traces
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http: # Porta padrão: 4318
        grpc: # Porta padrão: 4317 (onde a API .NET envia os traces)

ingester:
  max_block_duration: 5m

# Retenção de 7 dias — requer image pinada (2.7.2+), latest quebrou o schema
compactor:
  compaction:
    block_retention: 168h

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
[databases]
eleverats_db = host=db port=5432 dbname=eleverats_db
n8n_db = host=db port=5432 dbname=n8n_db
plane_db = host=db port=5432 dbname=plane_db
metabase_db = host=db port=5432 dbname=metabase_db
sonarqube_db = host=db port=5432 dbname=sonarqube_db

[pgbouncer]
listen_addr = *
listen_port = 5432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 5
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
admin_users = ${DB_USER}
ignore_startup_parameters = extra_float_digits, statement_timeout
